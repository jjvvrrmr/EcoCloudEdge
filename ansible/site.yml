---
# 1. Aprovisionamiento Base (Todos los nodos)
- name: Preparar configuración base del sistema operativo
  hosts: all
  become: yes
  roles:
    - base

# 2. Despliegue del Plano de Control de Kubernetes
- name: Desplegar nodo maestro de k3s
  hosts: master
  become: yes
  roles:
    - k3s_master

# 3. Unión de los Nodos Trabajadores
- name: Desplegar nodos workers de k3s
  hosts: workers
  become: yes
  roles:
    - k3s_worker

# 4. Bootstrap de GitOps (Solo en el Maestro)
- name: Instalar y configurar ArgoCD para despliegue automático
  hosts: master
  become: yes
  tasks:
    - name: Crear namespace para ArgoCD de forma idempotente
      shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

    - name: Instalar los manifiestos base de ArgoCD
      shell: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      changed_when: false

    - name: Esperar a que los pods de ArgoCD estén operativos
      shell: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s
      changed_when: false
      
    - name: Aplicar servicio LoadBalancer para ArgoCD
      shell: kubectl apply -f {{ playbook_dir }}/../manifests/00-argocd/argocd-service.yaml
      changed_when: false

    - name: Desplegar el patrón 'App of Apps' (Sincronización GitOps)
      shell: kubectl apply -f {{ playbook_dir }}/../manifests/00-argocd/apps.yaml
      changed_when: false