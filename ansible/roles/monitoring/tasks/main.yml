---
# ansible/roles/monitoring/tasks/main.yml
# Hito 6 — Stack de monitorización aligerado para Raspberry Pi

- name: "Crear namespace monitoring"
  ansible.builtin.command: k3s kubectl create namespace monitoring
  register: monitoring_ns_create
  failed_when: monitoring_ns_create.rc != 0 and 'already exists' not in monitoring_ns_create.stderr
  changed_when: monitoring_ns_create.rc == 0

- name: "Copiar HelmChart de kube-prometheus-stack"
  ansible.builtin.template:
    src: monitoring-helmchart.yaml.j2
    dest: /tmp/monitoring-helmchart.yaml
    mode: '0644'

- name: "Aplicar stack de monitorización"
  ansible.builtin.command: k3s kubectl apply -f /tmp/monitoring-helmchart.yaml
  changed_when: false

- name: "Esperar a que Grafana esté Running (descarga pesada, ~15 min)"
  ansible.builtin.command: >
    k3s kubectl wait --namespace monitoring
    --for=condition=ready pod
    --selector=app.kubernetes.io/name=grafana
    --timeout=300s
  register: monitoring_grafana_ready
  retries: 20
  delay: 30
  until: monitoring_grafana_ready.rc == 0
  changed_when: false

- name: "Verificar pods de monitorización"
  ansible.builtin.command: k3s kubectl get pods -n monitoring
  register: monitoring_pods
  changed_when: false

- name: "Mostrar estado del Hito 6"
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines

- name: "Instrucciones finales"
  ansible.builtin.debug:
    msg:
      - "=== HITO 6 COMPLETADO ==="
      - "Grafana disponible en: http://{{ grafana_domain | default('monitor.ecocloud.local') }}"
      - "Usuario: admin"
      - "Contraseña: la definida en GRAFANA_ADMIN_PASSWORD"
      - "Dashboards recomendados: 1860 (Node Exporter), 13032 (k3s), 13200 (Longhorn)"
