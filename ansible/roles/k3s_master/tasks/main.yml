---
# ansible/roles/k3s_master/tasks/main.yml
# Hito 1 — Despliegue del Control Plane en node1
# Instala k3s sin Traefik ni ServiceLB (se desplegarán personalizados en Hito 2)

- name: "Comprobar si k3s ya está instalado"
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Instalara k3s en el nodo maestro
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --disable servicelb --disable local-storage" sh -
  environment:
    K3S_TOKEN: "{{ k3s_token }}"
  args:
    creates: /etc/rancher/k3s/k3s.yaml

- name: "Esperar a que k3s esté listo"
  command: k3s kubectl get nodes
  register: nodes_ready
  until: nodes_ready.rc == 0
  retries: 15
  delay: 10

- name: "Leer el node-token para los Workers"
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: "Guardar el token como fact para que los Workers lo usen"
  set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: "Compartir el token con todos los hosts del inventario"
  add_host:
    name: "{{ item }}"
    k3s_node_token: "{{ k3s_node_token }}"
  loop: "{{ groups['workers'] }}"

- name: "Verificar estado del clúster"
  command: k3s kubectl get nodes
  register: cluster_status

- name: "Mostrar estado del clúster"
  debug:
    var: cluster_status.stdout_lines
