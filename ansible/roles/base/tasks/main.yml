---
# ansible/roles/base/tasks/main.yml
# Hito 1 — Preparación del sistema operativo (todos los nodos)
# Equivalente a los pasos manuales del borrador: apt update, cgroups, iSCSI, reboot

- name: "Actualizar repositorios y paquetes"
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: "Instalar dependencias para k3s y Longhorn"
  apt:
    name:
      - curl
      - open-iscsi
      - nfs-common
      - ufw
    state: present

- name: "Habilitar e iniciar el servicio iSCSI (requerido por Longhorn)"
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: "Leer cmdline.txt actual del kernel"
  slurp:
    src: /boot/firmware/cmdline.txt
  register: cmdline_content

- name: "Habilitar cgroups en el arranque del kernel (si no están ya)"
  lineinfile:
    path: /boot/firmware/cmdline.txt
    backrefs: true
    regexp: '^((?!.*cgroup_enable=cpuset).*)$'
    line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1 swapaccount=1'
  register: cgroups_updated

- name: "Reiniciar el nodo si se modificó cmdline.txt"
  reboot:
    msg: "Reinicio para aplicar cgroups"
    reboot_timeout: 120
  when: cgroups_updated.changed

- name: "Deshabilitar swap permanentemente"
  command: swapoff -a
  changed_when: false

- name: "Eliminar swap del fstab"
  lineinfile:
    path: /etc/fstab
    regexp: '^\s*[^#].*\sswap\s'
    state: absent
