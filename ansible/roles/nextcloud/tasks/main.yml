---
# ansible/roles/nextcloud/tasks/main.yml
# Hito 4 — Ecosistema de nube privada

- name: "Copiar manifiesto de MariaDB"
  ansible.builtin.template:
    src: mariadb.yaml.j2
    dest: /tmp/mariadb.yaml
    mode: '0644'

- name: "Aplicar MariaDB"
  ansible.builtin.command: k3s kubectl apply -f /tmp/mariadb.yaml
  changed_when: false

- name: "Esperar a que MariaDB esté Running (puede tardar ~5 min)"
  ansible.builtin.command: >
    k3s kubectl wait --namespace default
    --for=condition=ready pod
    --selector=app=mariadb
    --timeout=180s
  register: nextcloud_mariadb_ready
  retries: 3
  delay: 20
  until: nextcloud_mariadb_ready.rc == 0
  changed_when: false

- name: "Copiar manifiesto de Nextcloud"
  ansible.builtin.template:
    src: nextcloud.yaml.j2
    dest: /tmp/nextcloud.yaml
    mode: '0644'

- name: "Aplicar Nextcloud + Ingress"
  ansible.builtin.command: k3s kubectl apply -f /tmp/nextcloud.yaml
  changed_when: false

- name: "Esperar a que Nextcloud esté Running (puede tardar ~5 min)"
  ansible.builtin.command: >
    k3s kubectl wait --namespace default
    --for=condition=ready pod
    --selector=app=nextcloud
    --timeout=360s
  register: nextcloud_ready
  retries: 3
  delay: 30
  until: nextcloud_ready.rc == 0
  changed_when: false

- name: "Verificar pods del Hito 4"
  ansible.builtin.command: >
    k3s kubectl get pods -n default -l "app in (mariadb,nextcloud)"
  register: nextcloud_hito4_pods
  changed_when: false

- name: "Mostrar estado del Hito 4"
  ansible.builtin.debug:
    var: nextcloud_hito4_pods.stdout_lines
