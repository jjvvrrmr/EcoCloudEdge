---
# ansible/roles/metallb/tasks/main.yml
# Hito 2 — MetalLB v0.14.3

- name: "Desplegar MetalLB v0.14.3"
  ansible.builtin.command: >
    k3s kubectl apply -f
    https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
  changed_when: false

- name: "Esperar a que los pods de MetalLB estén listos"
  ansible.builtin.command: >
    k3s kubectl wait --namespace metallb-system
    --for=condition=ready pod
    --selector=app=metallb
    --timeout=120s
  changed_when: false

- name: "Copiar configuración del pool de IPs"
  ansible.builtin.template:
    src: metallb-pool.yaml.j2
    dest: /tmp/metallb-pool.yaml
    mode: '0644'

- name: "Aplicar pool de IPs y L2Advertisement"
  ansible.builtin.command: k3s kubectl apply -f /tmp/metallb-pool.yaml
  changed_when: false

- name: "Verificar pool de MetalLB"
  ansible.builtin.command: k3s kubectl get ipaddresspool -n metallb-system
  register: metallb_pool
  changed_when: false

- name: "Mostrar pool de IPs"
  ansible.builtin.debug:
    var: metallb_pool.stdout_lines
