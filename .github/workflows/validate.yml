# =====================================================================
# EcoCloud Edge — Pipeline CI
# Se ejecuta en cada push y en cada Pull Request
#
# Qué hace:
#   1. Lint de todos los YAML del repo (yamllint)
#   2. Validación de manifiestos Kubernetes contra la API de k8s (kubeconform)
#   3. Lint del playbook Ansible (ansible-lint)
#   4. Lint del código Python del middleware (flake8)
#   5. Escaneo de secretos hardcodeados (detect-secrets)
#   6. Build y push de imagen Docker del middleware a GHCR
#   7. Resumen final del pipeline
# =====================================================================

---
name: "Validate — EcoCloud Edge"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: YAML lint
  # ──────────────────────────────────────────────────────────
  yaml-lint:
    name: "YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar yamllint"
        run: pip install yamllint

      - name: "Ejecutar yamllint en manifests/ y ansible/"
        # Se ejecuta directamente. Si creas el .yamllint.yml en la raíz,
        # yamllint lo detectará automáticamente sin necesidad de indicarlo con -c.
        run: yamllint manifests/ ansible/ .github/workflows/

  # ──────────────────────────────────────────────────────────
  # JOB 2: Validación de manifiestos Kubernetes
  # ──────────────────────────────────────────────────────────
  kubeconform:
    name: "Kubernetes Manifest Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar kubeconform"
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: "Validar manifiestos (ignorando templates Jinja2 y SealedSecrets)"
        run: |
          find manifests/ -name "*.yaml" \
            ! -name "*.j2" \
            ! -name "*sealedsecret*" \
            | grep -v "template" \
            | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location \
              'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary

  # ──────────────────────────────────────────────────────────
  # JOB 3: Ansible lint
  # ──────────────────────────────────────────────────────────
  ansible-lint:
    name: "Ansible Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar ansible-lint"
        run: pip install ansible-lint

      - name: "Ejecutar ansible-lint en el playbook maestro"
        run: |
          cd ansible
          ansible-lint site.yml --exclude roles/

  # ──────────────────────────────────────────────────────────
  # JOB 4: Python lint (middleware)
  # ──────────────────────────────────────────────────────────
  python-lint:
    name: "Python Lint (middleware)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar flake8"
        run: pip install flake8

      - name: "Lint del middleware Python"
        run: flake8 middleware/ --max-line-length=100 --ignore=E501

  # ──────────────────────────────────────────────────────────
  # JOB 5: Detección de secretos accidentales
  # ──────────────────────────────────────────────────────────
  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Escanear secretos con detect-secrets"
        uses: reviewdog/action-detect-secrets@v0
        with:
          reporter: github-pr-check
          fail_on_error: true
        continue-on-error: true

      - name: "Búsqueda de secretos hardcodeados en texto plano"
        run: |
          echo "Buscando patrones de secretos en texto plano..."
          # Ignora los ficheros sealedsecret.yaml porque están cifrados
          if grep -r "EcoCloudAdmin2026\|EcoCloudDB2026\|EcoCloudRoot2026\|Nextcloud_pass\|AdminEcoCloud2026" \
            --include="*.yaml" --include="*.yml" --include="*.py" --include="*.txt" \
            --exclude="*sealedsecret*" \
            --exclude-dir=".git" --exclude-dir=".github" .; then
            echo "ERROR: Se encontraron secretos hardcodeados en el repositorio"
            echo "Usa variables de entorno o .env (ver .env.example)"
            exit 1
          fi
          echo "OK — No se encontraron secretos hardcodeados"

  # ──────────────────────────────────────────────────────────
  # JOB 6: Build y push de imagen Docker del middleware
  # Solo se ejecuta en push a main (no en PRs)
  # ──────────────────────────────────────────────────────────
  build-middleware:
    name: "Build & Push Middleware Image"
    runs-on: ubuntu-latest
    needs: [yaml-lint, kubeconform, python-lint, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Login a GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Extraer metadata para la imagen"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/middleware
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: "Build y push"
        uses: docker/build-push-action@v5
        with:
          context: ./middleware
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
  # ──────────────────────────────────────────────────────────
  # JOB 7: Resumen final del pipeline
  # ──────────────────────────────────────────────────────────
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [yaml-lint, kubeconform, ansible-lint, python-lint, secret-scan, build-middleware]
    if: always()
    steps:
      - name: "Mostrar resultado"
        run: |
          echo "=== EcoCloud Edge CI Pipeline ==="
          echo "yaml-lint:        ${{ needs.yaml-lint.result }}"
          echo "kubeconform:      ${{ needs.kubeconform.result }}"
          echo "ansible-lint:     ${{ needs.ansible-lint.result }}"
          echo "python-lint:      ${{ needs.python-lint.result }}"
          echo "secret-scan:      ${{ needs.secret-scan.result }}"
          echo "build-middleware: ${{ needs.build-middleware.result }}"
