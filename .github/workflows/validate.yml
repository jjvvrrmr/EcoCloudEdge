# =====================================================================
# EcoCloud Edge — Pipeline CI
# Se ejecuta en cada push, Pull Request y de forma manual
#
# Qué hace:
#   1. Lint de todos los YAML del repo (yamllint)
#   2. Validación de manifiestos Kubernetes contra la API de k8s (kubeconform)
#   3. Lint del playbook Ansible (ansible-lint)
#   4. Lint del código Python del middleware (flake8)
#   5. Escaneo de secretos hardcodeados (detect-secrets)
#   6. Resumen final del pipeline
# =====================================================================

---
name: "Validate — EcoCloud Edge"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: 

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: YAML lint
  # ──────────────────────────────────────────────────────────
  yaml-lint:
    name: "YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar yamllint"
        run: pip install yamllint

      - name: "Ejecutar yamllint en manifests/ y ansible/"
        run: |
          echo "### 📝 Resultados de Yamllint" >> $GITHUB_STEP_SUMMARY
          set +e
          OUTPUT=$(yamllint manifests/ ansible/ .github/workflows/ 2>&1)
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ **Se encontraron errores de formato YAML:**" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Haz clic para ver los detalles del error</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          else
            echo "✅ Todo el YAML validado correctamente." >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 2: Validación de manifiestos Kubernetes
  # ──────────────────────────────────────────────────────────
  kubeconform:
    name: "Kubernetes Manifest Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar kubeconform"
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: "Validar manifiestos (ignorando templates Jinja2 y SealedSecrets)"
        run: |
          echo "### ☸️ Resultados de Kubeconform" >> $GITHUB_STEP_SUMMARY
          set +e
          OUTPUT=$(find manifests/ -name "*.yaml" ! -name "*.j2" ! -name "*sealedsecret*" | grep -v "template" | xargs kubeconform -strict -ignore-missing-schemas -schema-location default -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' -summary 2>&1)
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ **Se encontraron errores en los manifiestos de Kubernetes:**" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Haz clic para ver los detalles</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          else
            echo "✅ Manifiestos K8s validados correctamente." >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 3: Ansible lint
  # ──────────────────────────────────────────────────────────
  ansible-lint:
    name: "Ansible Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar ansible-lint"
        run: pip install ansible-lint

      - name: "Ejecutar ansible-lint en el playbook maestro"
        run: |
          echo "### ⚙️ Resultados de Ansible Lint" >> $GITHUB_STEP_SUMMARY
          cd ansible
          set +e
          OUTPUT=$(ansible-lint site.yml 2>&1)
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ **Se encontraron problemas en los playbooks o roles:**" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Haz clic para ver los detalles del error</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          else
            echo "✅ Playbooks de Ansible validados correctamente." >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 4: Python lint (middleware)
  # ──────────────────────────────────────────────────────────
  python-lint:
    name: "Python Lint (middleware)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Instalar flake8"
        run: pip install flake8

      - name: "Lint del middleware Python"
        run: |
          echo "### 🐍 Resultados de Flake8 (Python)" >> $GITHUB_STEP_SUMMARY
          if [ -d "middleware" ]; then
            set +e
            OUTPUT=$(flake8 middleware/ --max-line-length=100 2>&1)
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ **Se encontraron problemas en el código Python:**" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>Haz clic para ver los detalles del error</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              exit $EXIT_CODE
            else
              echo "✅ Código Python validado correctamente." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **ERROR:** El directorio \`middleware/\` no existe." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 5: Detección de secretos accidentales
  # ──────────────────────────────────────────────────────────
  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Escanear secretos con detect-secrets"
        uses: reviewdog/action-detect-secrets@v0
        with:
          reporter: github-pr-check
          fail_on_error: true
        continue-on-error: true

      - name: "Búsqueda de secretos hardcodeados en texto plano"
        run: |
          echo "Buscando patrones de secretos en texto plano..."
          if grep -r "EcoCloudAdmin2026\|EcoCloudDB2026\|EcoCloudRoot2026\|Nextcloud_pass\|AdminEcoCloud2026" \
            --include="*.yaml" --include="*.yml" --include="*.py" --include="*.txt" \
            --exclude="*sealedsecret*" \
            --exclude-dir=".git" --exclude-dir=".github" .; then
            echo "ERROR: Se encontraron secretos hardcodeados en el repositorio"
            echo "Usa variables de entorno o .env (ver .env.example)"
            exit 1
          fi
          echo "OK — No se encontraron secretos hardcodeados"

  # ──────────────────────────────────────────────────────────
  # JOB 6: Resumen final del pipeline
  # ──────────────────────────────────────────────────────────
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [yaml-lint, kubeconform, ansible-lint, python-lint, secret-scan]
    if: always()
    steps:
      - name: "Mostrar resultado"
        run: |
          echo "### 🚀 Resumen Final del Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- **YAML Lint:** ${{ needs.yaml-lint.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Kubeconform:** ${{ needs.kubeconform.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ansible Lint:** ${{ needs.ansible-lint.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Lint:** ${{ needs.python-lint.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secret Scan:** ${{ needs.secret-scan.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
