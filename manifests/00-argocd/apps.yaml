# manifests/00-argocd/apps.yaml
#
# Patrón "App of Apps" de ArgoCD — EcoCloud Edge
#
# NOTA: ArgoCD es una mejora futura del proyecto. Para el despliegue
# inicial del TFG se usa el playbook Ansible (ansible/site.yml).
# Este fichero se deja documentado para implementación posterior.
# ---------------------------------------------------------------------------

# ── Namespaces ───────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecocloud-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jjvvrrmr/EcoCloudEdge.git
    targetRevision: main
    path: manifests/01-namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
