# manifests/09-ollama/middleware.yaml
#
# Middleware Python — Webhook Nextcloud → Ollama.
#
# Este microservicio recibe peticiones HTTP POST con un campo "prompt"
# y las reenvía a la API de Ollama, devolviendo la respuesta generada.
# Actúa como puente entre los webhooks de Nextcloud y el motor de IA.
#
# El código Python se inyecta mediante un ConfigMap para no requerir
# construir una imagen Docker personalizada en los nodos (que con red
# de 100 Mbps y Raspberry Pi sería muy lento). La imagen base usada
# es python:3.10-alpine (~50 MB frente a los ~900 MB de python:3.10).
#
# MEJORA respecto al borrador del TFG:
#   - Añadido timeout de 120s en la llamada a Ollama (evita que el pod
#     quede colgado indefinidamente si Ollama no responde).
#   - Añadido endpoint GET /health para los probes de Kubernetes.
#   - Manejo separado de JSONDecodeError para devolver 400 en vez de 500.
#
# REQUISITO PREVIO: Ollama debe estar Running y el modelo tinyllama
# descargado (ollama pull tinyllama) antes de que este pod reciba peticiones.
#
# Aplicar:
#   sudo k3s kubectl apply -f manifests/09-ollama/middleware.yaml
#
# Verificar:
#   sudo k3s kubectl get pods -l app=middleware
#   sudo k3s kubectl logs deploy/middleware
#   # Prueba de integración desde dentro del clúster:
#   sudo k3s kubectl run curl-test --image=curlimages/curl:latest --rm -i --tty -- \
#     curl -s -X POST http://middleware-svc:5000 \
#     -H "Content-Type: application/json" \
#     -d '{"prompt":"¿De qué color es el cielo?"}'
# ---------------------------------------------------------------------------

# ── ConfigMap con el código Python ──────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: middleware-script
  namespace: default
  labels:
    app: middleware
data:
  main.py: |
    import urllib.request
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    OLLAMA_URL = "http://ollama-svc:11434/api/generate"
    OLLAMA_TIMEOUT = 120
    class WebhookHandler(BaseHTTPRequestHandler):
        def log_message(self, format, *args):
            print(f"[middleware] {format % args}")

        def do_GET(self):
            if self.path == "/health":
                self.send_response(200)
                self.send_header("Content-type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"status": "ok"}).encode("utf-8"))
            else:
                self.send_response(404)
                self.end_headers()

        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", 0))
            if content_length == 0:
                self.send_response(400)
                self.end_headers()
                self.wfile.write(
                    json.dumps({"error": "No body"}).encode("utf-8")
                )
                return

            post_data = self.rfile.read(content_length)

            try:
                data = json.loads(post_data)
                prompt = data.get("prompt", "Resume este texto brevemente.")

                ollama_payload = {
                    "model": "tinyllama",
                    "prompt": prompt,
                    "stream": False,
                }

                req = urllib.request.Request(
                    OLLAMA_URL,
                    data=json.dumps(ollama_payload).encode("utf-8"),
                    headers={"Content-Type": "application/json"},
                )

                with urllib.request.urlopen(req, timeout=OLLAMA_TIMEOUT) as response:
                    result = json.loads(response.read().decode("utf-8"))

                self.send_response(200)
                self.send_header("Content-type", "application/json")
                self.end_headers()
                self.wfile.write(
                    json.dumps(
                        {
                            "status": "success",
                            "respuesta": result.get("response", ""),
                        }
                    ).encode("utf-8")
                )

            except json.JSONDecodeError as e:
                self.send_response(400)
                self.send_header("Content-type", "application/json")
                self.end_headers()
                self.wfile.write(
                    json.dumps({"error": f"JSON invalido: {str(e)}"}).encode("utf-8")
                )

            except Exception as e:
                print(f"[middleware] ERROR: {e}")
                self.send_response(500)
                self.send_header("Content-type", "application/json")
                self.end_headers()
                self.wfile.write(
                    json.dumps({"error": str(e)}).encode("utf-8")
                )
    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", 5000), WebhookHandler)
        print("[middleware] Activo en puerto 5000...")
        server.serve_forever()
---
# ── Deployment ──────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
  namespace: default
  labels:
    app: middleware
spec:
  replicas: 1
  strategy:
    type: Recreate              # Consistencia con el resto de Deployments
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
    spec:
      containers:
        - name: python-middleware
          image: python:3.10-alpine
          command: ["python", "/app/main.py"]
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: script-volume
              mountPath: /app
      volumes:
        - name: script-volume
          configMap:
            name: middleware-script
---
# ── Service ClusterIP ────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: middleware-svc
  namespace: default
  labels:
    app: middleware
spec:
  selector:
    app: middleware
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP